<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="archGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F0D2E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bgGrad)"/>

  <!-- Outer arch structure - the "A" shape -->
  <path d="M64 18 L24 108 L36 108 L48 72 L80 72 L92 108 L104 108 Z"
        fill="none" stroke="url(#archGrad)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner crossbar -->
  <line x1="44" y1="82" x2="84" y2="82" stroke="url(#archGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 3 node dots on the arch — agent delegation points -->
  <circle cx="64" cy="18" r="5" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="36" cy="108" r="3.5" fill="#6366F1" opacity="0.8"/>
  <circle cx="92" cy="108" r="3.5" fill="#6366F1" opacity="0.8"/>

  <!-- Neural connection lines from apex to base nodes -->
  <line x1="64" y1="24" x2="44" y2="82" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="24" x2="84" y2="82" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>

  <!-- Small accent dots on crossbar — module connection points -->
  <circle cx="52" cy="82" r="2" fill="#06B6D4" opacity="0.6"/>
  <circle cx="64" cy="82" r="2" fill="#06B6D4" opacity="0.6"/>
  <circle cx="76" cy="82" r="2" fill="#06B6D4" opacity="0.6"/>
</svg>
