<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background: classic VS Code dark theme -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>

    <!-- Gradient for the main shape: VS Code blue to accent purple -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007ACC"/> <!-- VS Code classic blue -->
      <stop offset="100%" stop-color="#8A2BE2"/> <!-- Deep purple accent -->
    </linearGradient>

    <!-- Gradient for the inner core -->
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3794FF"/>
      <stop offset="100%" stop-color="#007ACC"/>
    </linearGradient>

    <!-- Subtle drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Logo Mark -->
  <g transform="translate(64, 64)" filter="url(#shadow)">
    <!-- Main outer "C" shape (The System/Workflow) -->
    <path d="M 15,-28 
             A 36,36 0 1,0 15,28" 
          fill="none" 
          stroke="url(#brandGrad)" 
          stroke-width="16" 
          stroke-linecap="round"/>
          
    <!-- Inner intelligence core (The Cortex/Architect) -->
    <circle cx="8" cy="0" r="14" fill="url(#coreGrad)"/>
    
    <!-- Connection node (The Agent delegation point) -->
    <circle cx="-21" cy="0" r="6" fill="#1E1E1E"/>
  </g>
</svg>
