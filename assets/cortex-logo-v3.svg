<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background: classic VS Code dark theme with subtle radial gradient for depth -->
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#252526"/>
      <stop offset="100%" stop-color="#181818"/>
    </radialGradient>

    <!-- Main Gradient: VS Code Blue to vibrant Magenta/Pink accent -->
    <linearGradient id="cortexV3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00AEEF"/> <!-- Bright Cyan/Blue -->
      <stop offset="100%" stop-color="#E10098"/> <!-- Magenta -->
    </linearGradient>

    <!-- Glow for the central intelligence node -->
    <filter id="nodeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow for premium feel -->
    <filter id="innerDrop">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base dark rounded rect -->
  <rect width="128" height="128" rx="26" fill="url(#bgRadial)"/>

  <!-- Logo Group -->
  <g transform="translate(64, 64)" filter="url(#innerDrop)">
    <!-- Isometric/Hexagonal "C" shape representing structure and logic -->
    <!-- Top arc -->
    <path d="M 12,-30 L -10,-42 L -32,-30 L -32,30 L -10,42 L 12,30" 
          fill="none" 
          stroke="url(#cortexV3Grad)" 
          stroke-width="12" 
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Inner connection path (The Agentic Workflow) -->
    <path d="M -10,-24 L -20,-18 L -20,18 L -10,24" 
          fill="none" 
          stroke="#00AEEF" 
          stroke-width="4" 
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.8"/>

    <!-- Central Architect Node (The "Cortex") -->
    <circle cx="8" cy="0" r="10" fill="#E10098" filter="url(#nodeGlow)"/>
    <circle cx="8" cy="0" r="4" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Horizon line / Data flow -->
    <line x1="-20" y1="0" x2="-2" y2="0" stroke="#00AEEF" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
