<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Vibrant gradient optimized for both dark and light VS Code themes -->
    <linearGradient id="cortexV4Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D2FF"/> <!-- Vivid Cyan -->
      <stop offset="50%" stop-color="#3A7BD5"/> <!-- Classic Blue -->
      <stop offset="100%" stop-color="#8B5CF6"/> <!-- Premium Violet -->
    </linearGradient>

    <!-- Subtle drop shadow to pop off any background -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- NO background rect. Transparent by default for VS Code integration -->

  <!-- Logo Mark (Centered) -->
  <g transform="translate(64, 64)" filter="url(#softShadow)">
    
    <!-- Outer primary "C" (Cortex / Core) -->
    <path d="M 32,-32 
             A 42,42 0 1,0 32,32" 
          fill="none" 
          stroke="url(#cortexV4Grad)" 
          stroke-width="18" 
          stroke-linecap="round"/>

    <!-- Inner intelligence node (The Architect) -->
    <!-- Positioned to complete the circular visual weight but distinctly separate -->
    <circle cx="16" cy="0" r="14" fill="url(#cortexV4Grad)"/>

    <!-- Small logic connection dot -->
    <circle cx="-32" cy="0" r="5" fill="#FFFFFF" opacity="0.9"/>
    
  </g>
</svg>
