<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Minimalist, Flat Design, No Gradients -->
  
  <g transform="translate(64, 64)">
    <!-- Main Outer Structure: The "C" (representing Cortex & Container) -->
    <!-- Using a single solid brand color (Azure Blue) typical for VS code extensions -->
    <path d="M 32,-32 
             A 44,44 0 1,0 32,32" 
          fill="none" 
          stroke="#007ACC" 
          stroke-width="16" 
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Inner Core: The Architect Agent -->
    <!-- Solid fill, matching the stroke color, perfectly aligned -->
    <circle cx="12" cy="0" r="14" fill="#007ACC"/>
    
    <!-- Outer Node: Delegation / Event Bus -->
    <circle cx="-32" cy="0" r="14" fill="#007ACC"/>
    
    <!-- Connection path between Core and Node -->
    <line x1="-32" y1="0" x2="12" y2="0" stroke="#007ACC" stroke-width="6"/>

    <!-- Negative space cut-outs for contrast and technical feel -->
    <!-- Cut inner core -->
    <circle cx="12" cy="0" r="4" fill="#FFFFFF"/>
    <!-- Cut outer node -->
    <circle cx="-32" cy="0" r="4" fill="#FFFFFF"/>
  </g>
</svg>
