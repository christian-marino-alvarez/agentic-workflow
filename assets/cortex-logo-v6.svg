<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Ultra-Minimalist, Flat, VS Code Theme Colors -->
  <g transform="translate(56, 64)">
    
    <!-- Outer "C" (The Cortex / System) -->
    <!-- Color: Classic VS Code Blue -->
