<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Vibrant gradient for the structural nodes -->
    <linearGradient id="cortexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/> <!-- Violet -->
      <stop offset="50%" stop-color="#3B82F6"/> <!-- Blue -->
      <stop offset="100%" stop-color="#06B6D4"/> <!-- Cyan -->
    </linearGradient>
    
    <!-- Deep premium background -->
    <linearGradient id="bgCortex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/> <!-- Dark Indigo -->
      <stop offset="100%" stop-color="#09090B"/> <!-- Deep black -->
    </linearGradient>

    <!-- Glow effect for active nodes -->
    <filter id="cortexGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shape -->
  <rect width="128" height="128" rx="28" fill="url(#bgCortex)"/>

  <!-- Main Cortex Structure (Brain-inspired abstract geometric shape) -->
  <g transform="translate(14, 14)">
    <!-- Central Architect Node (The Core) -->
    <circle cx="50" cy="50" r="14" fill="none" stroke="url(#cortexGrad)" stroke-width="4"/>
    <circle cx="50" cy="50" r="6" fill="#06B6D4" filter="url(#cortexGlow)"/>

    <!-- Left Hemisphere (View/UI capabilities) -->
    <path d="M 24 50 C 24 20, 50 14, 50 14" fill="none" stroke="url(#cortexGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 24 50 C 24 80, 50 86, 50 86" fill="none" stroke="url(#cortexGrad)" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Right Hemisphere (Backend/Logic capabilities) -->
    <path d="M 76 50 C 76 20, 50 14, 50 14" fill="none" stroke="url(#cortexGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 76 50 C 76 80, 50 86, 50 86" fill="none" stroke="url(#cortexGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Intersecting Synapses -->
    <line x1="24" y1="50" x2="36" y2="50" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="50" x2="64" y2="50" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="14" x2="50" y2="36" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="86" x2="50" y2="64" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>

    <!-- Specialized Agent Nodes -->
    <!-- Memory/History -->
    <circle cx="50" cy="14" r="4.5" fill="#3B82F6" />
    <circle cx="50" cy="86" r="4.5" fill="#8B5CF6" />
    <!-- View & Backend limits -->
    <circle cx="24" cy="50" r="4.5" fill="#06B6D4" filter="url(#cortexGlow)"/>
    <circle cx="76" cy="50" r="4.5" fill="#8B5CF6" filter="url(#cortexGlow)"/>

    <!-- Secondary synapses (sub-agents) -->
    <circle cx="32" cy="26" r="2.5" fill="#3B82F6" opacity="0.8"/>
    <circle cx="68" cy="26" r="2.5" fill="#3B82F6" opacity="0.8"/>
    <circle cx="32" cy="74" r="2.5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="68" cy="74" r="2.5" fill="#8B5CF6" opacity="0.8"/>
  </g>
</svg>
